name: Event Prep Automation

on:
  schedule:
    # Runs every day at 8:00 AM ET (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run in backfill mode (creates subtasks for existing events)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      reset_subtasks:
        description: 'Delete all existing subtasks and recreate with correct assignees'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push events.ics back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Event Prep Automation
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.reset_subtasks }}" = "true" ]; then
            python event_prep_automation.py --reset-subtasks
          elif [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python event_prep_automation.py --backfill
          else
            python event_prep_automation.py
          fi

      - name: Commit and push events.ics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.ics
          git diff --staged --quiet || git commit -m "Update events.ics [$(date -u '+%Y-%m-%d')]"
          git push
