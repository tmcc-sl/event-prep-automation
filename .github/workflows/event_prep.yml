name: Event Prep Automation

on:
  schedule:
    # Runs every day at 8:00 AM ET (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:  # Allows you to run it manually from GitHub

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Event Prep Automation
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python event_prep_automation.py
